name: Render and Deploy Quarto HTML

on:
  push:
    branches: [ main ]

jobs:
  render-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repo
      uses: actions/checkout@v3

    - name: ⚙️ Setup Quarto
      uses: quarto-dev/quarto-actions/setup@v2

    - name: ⚙️ Setup R
      uses: r-lib/actions/setup-r@v2

    - name: 🧰 Install R packages
      run: |
        Rscript -e 'install.packages(c("tidyverse", "lubridate", "quarto"))'

    - name: 🛠️ Render the site
      run: quarto render

    - name: 🚀 Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: .  # publish root directory
